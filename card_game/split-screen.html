<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game - Split Screen</title>
    <link rel="stylesheet" href="split-screen.css">
</head>
<body>
    <div class="split-container">
        <!-- Player 1 Screen (Left) -->
        <div class="player-screen player1-screen">
            <div class="screen-header">
                <h2>Player 1</h2>
                <p id="p1-status" class="status-label">Your Turn</p>
            </div>
            
            <div class="controls-section">
                <h3>Your Controls</h3>
                <div class="controls-grid">
                    <div class="control-item">
                        <kbd>W</kbd><span>UP</span>
                    </div>
                    <div class="control-item">
                        <kbd>S</kbd><span>DOWN</span>
                    </div>
                    <div class="control-item">
                        <kbd>A</kbd><span>LEFT</span>
                    </div>
                    <div class="control-item">
                        <kbd>D</kbd><span>RIGHT</span>
                    </div>
                    <div class="control-item">
                        <kbd>SPACE</kbd><span>FLIP</span>
                    </div>
                    <div class="control-item">
                        <kbd>R</kbd><span>ROTATE</span>
                    </div>
                </div>
            </div>

            <div class="player-score">
                <h3>Your Matches</h3>
                <p class="score" id="p1-score">0</p>
            </div>
        </div>

        <!-- Shared Game Board (Center) -->
        <div class="game-center">
            <div class="game-title">
                <h1>🎮 Memory Card Game</h1>
                <p id="current-turn-display">Player 1's Turn</p>
            </div>
            <div class="game-board" id="gameBoard"></div>
            <button class="reset-btn" onclick="resetGame()">Reset Game</button>
        </div>

        <!-- Player 2 Screen (Right) -->
        <div class="player-screen player2-screen">
            <div class="screen-header">
                <h2>Player 2</h2>
                <p id="p2-status" class="status-label">Waiting...</p>
            </div>
            
            <div class="controls-section">
                <h3>Your Controls</h3>
                <div class="controls-grid">
                    <div class="control-item">
                        <kbd>↑</kbd><span>UP</span>
                    </div>
                    <div class="control-item">
                        <kbd>↓</kbd><span>DOWN</span>
                    </div>
                    <div class="control-item">
                        <kbd>←</kbd><span>LEFT</span>
                    </div>
                    <div class="control-item">
                        <kbd>→</kbd><span>RIGHT</span>
                    </div>
                    <div class="control-item">
                        <kbd>ENTER</kbd><span>FLIP</span>
                    </div>
                    <div class="control-item">
                        <kbd>SHIFT</kbd><span>ROTATE</span>
                    </div>
                </div>
            </div>

            <div class="player-score">
                <h3>Your Matches</h3>
                <p class="score" id="p2-score">0</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Update status labels
        function updateStatusLabels() {
            const p1Status = document.getElementById('p1-status');
            const p2Status = document.getElementById('p2-status');
            
            if (currentPlayer === 1) {
                p1Status.textContent = '✅ Your Turn';
                p2Status.textContent = '⏳ Waiting...';
            } else {
                p1Status.textContent = '⏳ Waiting...';
                p2Status.textContent = '✅ Your Turn';
            }
        }

        // Update scores
        function updateScores() {
            document.getElementById('p1-score').textContent = player1Matches;
            document.getElementById('p2-score').textContent = player2Matches;
        }

        // Update turn display
        function updateTurnDisplay() {
            document.getElementById('current-turn-display').textContent = `Player ${currentPlayer}'s Turn`;
            updateStatusLabels();
        }

        // Override switchPlayer to update display
        const originalSwitchPlayer = switchPlayer;
        switchPlayer = function() {
            originalSwitchPlayer();
            updateTurnDisplay();
        };

        // Override renderBoard to update scores
        const originalRenderBoard = renderBoard;
        renderBoard = function() {
            originalRenderBoard();
            updateScores();
            updateStatusLabels();
        };

        // Initialize
        window.addEventListener('load', () => {
            updateScores();
            updateStatusLabels();
        });
    </script>
</body>
</html>
